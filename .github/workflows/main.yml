name: Update configs every 30 minutes

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install aiohttp

      - name: Run script
        run: |
          python main.py

      - name: Show output (debug)
        run: |
          echo "=== output.txt ==="
          cat output.txt || echo "output.txt not found"
