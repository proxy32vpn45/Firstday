name: VPN Builder

on:
  schedule:
    - cron: "*/25 * * * *"  # каждые 30 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 20   # ⬅️ вот это "20 минут"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run script
        run: |
          python main.py

      - name: Commit output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output.txt

          git commit -m "update output" || echo "no changes"
          git push
